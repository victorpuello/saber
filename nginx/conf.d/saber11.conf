# =============================================================================
# Simulador Saber 11 — Nginx site config (producción)
# Dominio: saber11.ieplayasdelviento.edu.co
# =============================================================================

# Redirigir HTTP → HTTPS
server {
    listen 80;
    server_name saber11.ieplayasdelviento.edu.co saber11-api.ieplayasdelviento.edu.co;

    # ACME challenge para Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend — saber11.ieplayasdelviento.edu.co
server {
    listen 443 ssl http2;
    server_name saber11.ieplayasdelviento.edu.co;

    ssl_certificate /etc/letsencrypt/live/saber11.ieplayasdelviento.edu.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saber11.ieplayasdelviento.edu.co/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Headers de seguridad
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://frontend:5174;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API Gateway — saber11-api.ieplayasdelviento.edu.co
server {
    listen 443 ssl http2;
    server_name saber11-api.ieplayasdelviento.edu.co;

    ssl_certificate /etc/letsencrypt/live/saber11-api.ieplayasdelviento.edu.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saber11-api.ieplayasdelviento.edu.co/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Headers de seguridad
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting en login
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://gateway:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API general
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://gateway:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts para llamadas a servicios lentos (AI Generator)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Health check
    location /health {
        proxy_pass http://gateway:3000;
        access_log off;
    }
}
