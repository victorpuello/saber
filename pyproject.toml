# =============================================================================
# Ruff — Configuración de linting Python (raíz del monorepo)
# =============================================================================

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "S", "B", "A", "SIM"]
ignore = ["S101", "B008"]  # S101: assert en tests, B008: Depends() en FastAPI

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S101"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
asyncio_mode = "auto"
