<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,420,1,0" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: #f7f9fb; font-family: "Inter", sans-serif; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .label { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #737686; margin-bottom: 6px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; border-radius: 9999px; padding: 4px 10px; font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; }
  .area-dot { width: 6px; height: 6px; border-radius: 9999px; }
</style>
</head>
<body>
  <div>
    <div class="label">Status badges</div>
    <div class="row">
      <span class="badge" style="background:#d1fae5;color:#047857">APROBADO</span>
      <span class="badge" style="background:#fef3c7;color:#b45309">PENDIENTE</span>
      <span class="badge" style="background:#f1f5f9;color:#475569">BORRADOR</span>
    </div>
  </div>
  <div>
    <div class="label">Auth / info chip</div>
    <div class="row">
      <div style="display:inline-flex;align-items:center;gap:6px;background:#e6e8ea;border-radius:9999px;padding:6px 12px">
        <span class="material-symbols-outlined" style="font-size:14px;color:#505f76">verified_user</span>
        <span style="font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#505f76">Autenticación Kampus</span>
      </div>
      <div style="display:inline-flex;align-items:center;gap:6px;background:#dbe1ff;border-radius:9999px;padding:6px 12px">
        <span class="material-symbols-outlined" style="font-size:14px;color:#00174b">quiz</span>
        <span style="font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#00174b">2.340 preguntas</span>
      </div>
      <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(251,191,36,0.2);border-radius:9999px;padding:6px 12px;color:#b45309">
        <span class="material-symbols-outlined" style="font-size:14px">pending_actions</span>
        <span style="font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase">12 pendientes</span>
      </div>
    </div>
  </div>
  <div>
    <div class="label">Exam area pills (with dot)</div>
    <div class="row">
      <div style="display:inline-flex;align-items:center;gap:6px">
        <div class="area-dot" style="background:#60a5fa"></div>
        <span style="background:#eff6ff;color:#1d4ed8;font-size:11px;font-weight:700;border-radius:8px;padding:4px 10px">MAT</span>
      </div>
      <div style="display:inline-flex;align-items:center;gap:6px">
        <div class="area-dot" style="background:#a78bfa"></div>
        <span style="background:#f5f3ff;color:#6d28d9;font-size:11px;font-weight:700;border-radius:8px;padding:4px 10px">LC</span>
      </div>
      <div style="display:inline-flex;align-items:center;gap:6px">
        <div class="area-dot" style="background:#fbbf24"></div>
        <span style="background:#fffbeb;color:#b45309;font-size:11px;font-weight:700;border-radius:8px;padding:4px 10px">ING</span>
      </div>
      <div style="display:inline-flex;align-items:center;gap:6px">
        <div class="area-dot" style="background:#34d399"></div>
        <span style="background:#ecfdf5;color:#047857;font-size:11px;font-weight:700;border-radius:8px;padding:4px 10px">CN</span>
      </div>
      <div style="display:inline-flex;align-items:center;gap:6px">
        <div class="area-dot" style="background:#fb7185"></div>
        <span style="background:#fff1f2;color:#be123c;font-size:11px;font-weight:700;border-radius:8px;padding:4px 10px">SC</span>
      </div>
    </div>
  </div>
  <div>
    <div class="label">Avatar — AI vs Human author</div>
    <div class="row">
      <div style="display:inline-flex;align-items:center;gap:8px">
        <div style="width:28px;height:28px;border-radius:9999px;background:#ede9fe;color:#6d28d9;display:flex;align-items:center;justify-content:center">
          <span class="material-symbols-outlined" style="font-size:14px">auto_awesome</span>
        </div>
        <span style="font-size:13px;color:#191c1e">ScholarAI</span>
      </div>
      <div style="display:inline-flex;align-items:center;gap:8px">
        <div style="width:28px;height:28px;border-radius:9999px;background:#dbe1ff;color:#004ac6;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">VP</div>
        <span style="font-size:13px;color:#191c1e">V. Puello</span>
      </div>
    </div>
  </div>
</body>
</html>
