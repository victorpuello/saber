<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,420,0,0" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: #f7f9fb; font-family: "Inter", sans-serif; display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .label { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #737686; margin-bottom: 8px; }
</style>
</head>
<body>
  <div>
    <div class="label">Primary — scholar-gradient</div>
    <div class="row">
      <button style="display:inline-flex;align-items:center;gap:8px;padding:14px 24px;border-radius:12px;background:linear-gradient(135deg,#004ac6,#2563eb);color:white;font-size:16px;font-weight:700;border:none;cursor:pointer;box-shadow:0 24px 55px -30px rgb(0 74 198/35%)">
        Iniciar sesión <span class="material-symbols-outlined" style="font-size:20px">login</span>
      </button>
      <button style="display:inline-flex;align-items:center;gap:8px;padding:14px 24px;border-radius:12px;background:linear-gradient(135deg,#004ac6,#2563eb);color:white;font-size:16px;font-weight:700;border:none;opacity:0.65;cursor:not-allowed">
        Ingresando...
      </button>
    </div>
  </div>
  <div>
    <div class="label">Secondary / Ghost</div>
    <div class="row">
      <button style="display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border-radius:12px;background:#e6e8ea;color:#191c1e;font-size:15px;font-weight:700;border:none;cursor:pointer">
        Pausar
      </button>
      <button style="display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border-radius:12px;background:white;color:#191c1e;font-size:15px;font-weight:700;border:none;cursor:pointer">
        <span class="material-symbols-outlined" style="font-size:18px;color:#737686">chevron_left</span> Anterior
      </button>
      <button style="display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;background:#004ac6;color:white;font-size:14px;font-weight:600;border:none;cursor:pointer">
        Start Practice
      </button>
    </div>
  </div>
  <div>
    <div class="label">Icon button</div>
    <div class="row">
      <button style="display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:12px;background:#eceef0;border:none;cursor:pointer">
        <span class="material-symbols-outlined" style="font-size:20px;color:#505f76">zoom_in</span>
      </button>
      <button style="display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:12px;background:#eceef0;border:none;cursor:pointer">
        <span class="material-symbols-outlined" style="font-size:20px;color:#505f76">help</span>
      </button>
      <button style="display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:9999px;background:#004ac6;border:none;cursor:pointer;font-size:12px;font-weight:700;color:white">
        VP
      </button>
    </div>
  </div>
  <div>
    <div class="label">Finish / CTA gradient</div>
    <div class="row">
      <button style="display:inline-flex;align-items:center;gap:8px;height:64px;padding:0 28px;border-radius:16px;background:linear-gradient(to right,#004ac6,#2563eb);color:white;font-size:16px;font-weight:700;border:none;cursor:pointer;box-shadow:0 12px 40px rgba(0,74,198,0.25)">
        Siguiente <span class="material-symbols-outlined" style="font-size:20px">chevron_right</span>
      </button>
      <button style="display:inline-flex;align-items:center;gap:8px;height:64px;padding:0 28px;border-radius:16px;background:linear-gradient(to right,#004ac6,#2563eb);color:white;font-size:16px;font-weight:700;border:none;cursor:pointer;box-shadow:0 12px 40px rgba(0,74,198,0.25)">
        Finalizar <span class="material-symbols-outlined" style="font-size:20px">check</span>
      </button>
    </div>
  </div>
</body>
</html>
