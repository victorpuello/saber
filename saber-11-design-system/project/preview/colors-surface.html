<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: #e0e3e5; font-family: "Inter", sans-serif; display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { border-radius: 12px; overflow: hidden; flex: 1; min-width: 70px; border: 1px solid rgba(0,0,0,0.06); }
  .color { height: 72px; }
  .info { padding: 8px 10px; background: white; }
  .name { font-size: 10px; font-weight: 700; color: #191c1e; }
  .hex  { font-size: 10px; color: #737686; margin-top: 2px; font-family: monospace; }
</style>
</head>
<body>
  <div class="swatch"><div class="color" style="background:#ffffff"></div><div class="info"><div class="name">Lowest</div><div class="hex">#ffffff</div></div></div>
  <div class="swatch"><div class="color" style="background:#f7f9fb"></div><div class="info"><div class="name">Surface</div><div class="hex">#f7f9fb</div></div></div>
  <div class="swatch"><div class="color" style="background:#f2f4f6"></div><div class="info"><div class="name">Low</div><div class="hex">#f2f4f6</div></div></div>
  <div class="swatch"><div class="color" style="background:#eceef0"></div><div class="info"><div class="name">Container</div><div class="hex">#eceef0</div></div></div>
  <div class="swatch"><div class="color" style="background:#e6e8ea"></div><div class="info"><div class="name">High</div><div class="hex">#e6e8ea</div></div></div>
  <div class="swatch"><div class="color" style="background:#e0e3e5"></div><div class="info"><div class="name">Highest</div><div class="hex">#e0e3e5</div></div></div>
  <div class="swatch"><div class="color" style="background:#505f76"></div><div class="info"><div class="name">Secondary</div><div class="hex">#505f76</div></div></div>
  <div class="swatch"><div class="color" style="background:#737686"></div><div class="info"><div class="name">Outline</div><div class="hex">#737686</div></div></div>
  <div class="swatch"><div class="color" style="background:#c3c6d7"></div><div class="info"><div class="name">Outline Var.</div><div class="hex">#c3c6d7</div></div></div>
  <div class="swatch"><div class="color" style="background:#191c1e"></div><div class="info"><div class="name">On Surface</div><div class="hex">#191c1e</div></div></div>
  <div class="swatch"><div class="color" style="background:#434655"></div><div class="info"><div class="name">On Surf. Var.</div><div class="hex">#434655</div></div></div>
  <div class="swatch"><div class="color" style="background:#2d3133"></div><div class="info"><div class="name">Inverse Surf.</div><div class="hex">#2d3133</div></div></div>
</body>
</html>
