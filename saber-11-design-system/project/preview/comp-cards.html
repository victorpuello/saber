<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,420,1,0" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: #eceef0; font-family: "Inter", sans-serif; display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
</style>
</head>
<body>
  <!-- Hero card (dashboard) -->
  <div style="width:240px;min-height:200px;border-radius:32px;background:linear-gradient(to bottom right,#004ac6,#2563eb);color:white;padding:24px 24px 20px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 8px 24px rgba(0,74,198,0.2)">
    <div>
      <div style="font-size:10px;font-weight:700;letter-spacing:0.32em;text-transform:uppercase;opacity:0.8">PUNTAJE GLOBAL</div>
      <div style="margin-top:16px;display:flex;align-items:baseline;gap:8px">
        <span style="font-size:56px;font-weight:900;letter-spacing:-0.05em;line-height:1">278</span>
        <span style="font-size:18px;font-weight:500;opacity:0.6">/ 500</span>
      </div>
    </div>
    <div style="margin-top:24px">
      <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:500;margin-bottom:6px">
        <span>Progreso semanal</span><span>62%</span>
      </div>
      <div style="height:10px;border-radius:9999px;background:rgba(255,255,255,0.2)">
        <div style="height:100%;width:62%;border-radius:9999px;background:white"></div>
      </div>
    </div>
  </div>

  <!-- Metric card -->
  <div style="width:140px;border-radius:24px;background:white;border:1px solid rgba(195,198,215,0.1);box-shadow:0 12px 40px rgba(25,28,30,0.05);padding:20px">
    <div style="font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#505f76">PREGUNTAS</div>
    <div style="margin-top:8px;font-size:28px;font-weight:700;color:#191c1e">142</div>
    <div style="margin-top:6px;font-size:11px;color:#737686">respondidas esta semana</div>
  </div>

  <!-- Admin hero card -->
  <div style="width:280px;border-radius:32px;background:linear-gradient(to bottom right,#004ac6,#2563eb);color:white;padding:24px;position:relative;overflow:hidden;box-shadow:0 8px 24px rgba(0,74,198,0.2)">
    <div style="position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:9999px;background:rgba(255,255,255,0.05)"></div>
    <div style="position:absolute;right:30px;bottom:-28px;width:70px;height:70px;border-radius:9999px;background:rgba(255,255,255,0.05)"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px">
      <span class="material-symbols-outlined" style="font-size:18px;opacity:0.8">admin_panel_settings</span>
      <span style="font-size:10px;font-weight:700;letter-spacing:0.32em;text-transform:uppercase;opacity:0.8">Institución</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div><div style="font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;opacity:0.7">Estudiantes</div><div style="font-size:28px;font-weight:900;letter-spacing:-0.04em;margin-top:4px">847</div></div>
      <div><div style="font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;opacity:0.7">Puntaje prom.</div><div style="font-size:28px;font-weight:900;letter-spacing:-0.04em;margin-top:4px">312 pts</div></div>
    </div>
    <div style="margin-top:16px;display:flex;gap:8px">
      <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border-radius:9999px;padding:6px 12px">
        <span class="material-symbols-outlined" style="font-size:14px">quiz</span>
        <span style="font-size:11px;font-weight:700">2.340 preguntas</span>
      </div>
      <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(251,191,36,0.2);border-radius:9999px;padding:6px 12px;color:#fde68a">
        <span class="material-symbols-outlined" style="font-size:14px">pending_actions</span>
        <span style="font-size:11px;font-weight:700">12 pendientes</span>
      </div>
    </div>
  </div>
</body>
</html>
